# Render Blueprint — deploy all services from one repo
# https://render.com/docs/blueprint-spec

services:
  # ── Node.js Backend API ───────────────────────────────────────
  - type: web
    name: brandtide-api
    runtime: node
    region: oregon
    rootDir: server
    buildCommand: npm ci
    startCommand: node src/index.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false          # set manually in Render dashboard
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false
      - key: CLIENT_URL
        sync: false          # your Vercel frontend URL
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_FREE
        sync: false
      - key: STRIPE_PRICE_PRO
        sync: false
      - key: STRIPE_PRICE_ENTERPRISE
        sync: false
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_FROM_NAME
        value: BrandTide Support
      - key: ENCRYPTION_KEY
        sync: false
      - key: ML_SERVICE_URL
        fromService:
          type: web
          name: brandtide-ml
          property: host

  # ── Python ML Service ─────────────────────────────────────────
  - type: web
    name: brandtide-ml
    runtime: docker
    region: oregon
    rootDir: ml-service
    dockerfilePath: ./Dockerfile
    plan: starter          # needs 2GB+ RAM for model
    envVars:
      - key: HF_MODEL_REPO
        value: AbdullahCheemaDev/XLM-RoBERTa_Multilingual
      - key: ML_PORT
        value: "8000"
